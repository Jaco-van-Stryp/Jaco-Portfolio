name: Deploy Jaco Portfolio

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: jaco-portfolio
  # You can move these to GitHub Actions Variables
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '721651106263' }}

jobs:
  build-and-push:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID || '721651106263' }}.dkr.ecr.ap-southeast-2.amazonaws.com
    steps:
      - uses: actions/checkout@v4

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache-jaco
          cache-to: type=local,dest=/tmp/.buildx-cache-jaco-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-jaco
          mv /tmp/.buildx-cache-jaco-new /tmp/.buildx-cache-jaco

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID || '721651106263' }}.dkr.ecr.ap-southeast-2.amazonaws.com
    steps:
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Deploy
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"

          docker pull $IMAGE

          # Stop and remove old container if running
          docker rm -f jaco-portfolio 2>/dev/null || true

          # Run new container
          # Adjust ports as needed (mapped 4000 to host 4000)
          docker run -d \
            --name jaco-portfolio \
            --restart unless-stopped \
            -p 4000:4000 \
            $IMAGE

          # Clean up old images
          docker image prune -f
